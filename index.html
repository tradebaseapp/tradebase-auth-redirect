 <!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>TradeBase - Resetting Password...</title>
      <style>
          body {
              font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
              display: flex;
              justify-content: center;
              align-items: center;
              min-height: 100vh;
              margin: 0;
              background: linear-gradient(135deg, #0087FF 0%, #0064CC 100%);
              color: white;
          }
          .container {
              text-align: center;
              padding: 2rem;
              max-width: 600px;
          }
          .spinner {
              border: 4px solid rgba(255, 255, 255, 0.3);
              border-radius: 50%;
              border-top: 4px solid white;
              width: 40px;
              height: 40px;
              animation: spin 1s linear infinite;
              margin: 0 auto 1rem;
          }
          @keyframes spin {
              0% { transform: rotate(0deg); }
              100% { transform: rotate(360deg); }
          }
          .debug {
              margin-top: 2rem;
              padding: 1rem;
              background: rgba(0, 0, 0, 0.2);
              border-radius: 8px;
              font-size: 12px;
              text-align: left;
              word-break: break-all;
          }
      </style>
  </head>
  <body>
      <div class="container">
          <div class="spinner" id="spinner"></div>
          <h2>Redirecting to TradeBase...</h2>
          <p id="message">Please wait</p>
          <div class="debug" id="debug"></div>
      </div>

      <script>
          function redirect() {
              const debugEl = document.getElementById('debug');
              const messageEl = document.getElementById('message');
              const spinnerEl = document.getElementById('spinner');

              try {
                  // Extract tokens from URL hash (Supabase sends them as hash fragments)
                  const hash = window.location.hash.substring(1);
                  const params = new URLSearchParams(hash);
                  const accessToken = params.get('access_token');
                  const refreshToken = params.get('refresh_token');

                  // Show debug info
                  debugEl.innerHTML = `
                      <strong>Debug Info:</strong><br>
                      Full URL: ${window.location.href}<br>
                      Hash: ${hash || '(empty)'}<br>
                      Access Token: ${accessToken ? 'Present ✓' : 'Missing ✗'}<br>
                      Refresh Token: ${refreshToken ? 'Present ✓' : 'Missing ✗'}
                  `;

                  console.log('Hash:', hash);
                  console.log('Access Token:', accessToken ? 'Present' : 'Missing');
                  console.log('Refresh Token:', refreshToken ? 'Present' : 'Missing');

                  if (accessToken && refreshToken) {
                      // Redirect to app with tokens
                      const appUrl =
  `tradebase://reset-password?access_token=${accessToken}&refresh_token=${refreshToken}`;
                      console.log('Redirecting to:', appUrl);

                      messageEl.textContent = 'Opening TradeBase app...';
                      debugEl.innerHTML += `<br><br>Redirecting to app...`;

                      window.location.href = appUrl;

                      // After 3 seconds, show a message if still on this page
                      setTimeout(() => {
                          spinnerEl.style.display = 'none';
                          messageEl.textContent = 'If the app didn\'t open automatically, please 
  try again or make sure TradeBase is installed.';
                      }, 3000);
                  } else {
                      spinnerEl.style.display = 'none';
                      messageEl.textContent = 'Invalid reset link. Please request a new one.';
                      debugEl.innerHTML += `<br><br><strong>Error:</strong> No tokens found in 
  URL`;
                  }
              } catch (error) {
                  console.error('Redirect error:', error);
                  spinnerEl.style.display = 'none';
                  messageEl.textContent = 'An error occurred. Please try again.';
                  debugEl.innerHTML += `<br><br><strong>Error:</strong> ${error.message}`;
              }
          }

          // Wait a moment for URL to fully load, then redirect
          setTimeout(redirect, 500);
      </script>
  </body>
  </html>
