 <!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>TradeBase - Redirecting...</title>
      <script>
          // Extract tokens and redirect immediately
          (function() {
              const hash = window.location.hash.substring(1);
              if (hash) {
                  const params = new URLSearchParams(hash);
                  const accessToken = params.get('access_token');
                  const refreshToken = params.get('refresh_token');

                  if (accessToken && refreshToken) {
                      const appUrl = 'tradebase://reset-password?' +
                          'access_token=' + encodeURIComponent(accessToken) +
                          '&refresh_token=' + encodeURIComponent(refreshToken);

                      // Try to redirect immediately
                      window.location.href = appUrl;

                      // Also set a timeout to show instructions if redirect fails
                      setTimeout(function() {
                          document.getElementById('app-link').href = appUrl;
                          document.getElementById('app-link').style.display = 'inline-block';
                          document.getElementById('spinner').style.display = 'none';
                          document.getElementById('message').textContent = 'Tap the button below 
  if the app didn\'t open automatically:';
                      }, 2000);
                  }
              }
          })();
      </script>
      <style>
          body {
              font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
              display: flex;
              justify-content: center;
              align-items: center;
              min-height: 100vh;
              margin: 0;
              background: linear-gradient(135deg, #0087FF 0%, #0064CC 100%);
              color: white;
              text-align: center;
              padding: 2rem;
          }
          .container {
              max-width: 500px;
          }
          .spinner {
              border: 4px solid rgba(255, 255, 255, 0.3);
              border-radius: 50%;
              border-top: 4px solid white;
              width: 50px;
              height: 50px;
              animation: spin 1s linear infinite;
              margin: 0 auto 2rem;
          }
          @keyframes spin {
              0% { transform: rotate(0deg); }
              100% { transform: rotate(360deg); }
          }
          h1 {
              font-size: 28px;
              margin-bottom: 1rem;
          }
          p {
              font-size: 16px;
              opacity: 0.9;
              margin-bottom: 2rem;
          }
          .app-link {
              display: none;
              background: white;
              color: #0087FF;
              padding: 16px 32px;
              border-radius: 12px;
              text-decoration: none;
              font-weight: 600;
              font-size: 18px;
              transition: transform 0.2s;
          }
          .app-link:active {
              transform: scale(0.95);
          }
      </style>
  </head>
  <body>
      <div class="container">
          <div class="spinner" id="spinner"></div>
          <h1>Redirecting to TradeBase</h1>
          <p id="message">Please wait while we open the app...</p>
          <a href="#" id="app-link" class="app-link">Open TradeBase App</a>
      </div>
  </body>
  </html>
